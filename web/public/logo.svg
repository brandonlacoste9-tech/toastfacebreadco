<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" role="img" aria-label="JustBookMe">
  <defs>
    <linearGradient id="logo-bg" x1="4" y1="4" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e3a5f"/>
      <stop offset="1" stop-color="#2a5080"/>
    </linearGradient>
  </defs>
  <rect width="40" height="40" rx="11" fill="url(#logo-bg)"/>
  <!-- Calendar page -->
  <rect x="11" y="13" width="18" height="16" rx="3" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <rect x="11" y="13" width="18" height="5" rx="3" fill="rgba(255,255,255,0.18)"/>
  <circle cx="15" cy="15.5" r="1" fill="rgba(255,255,255,0.5)"/>
  <circle cx="25" cy="15.5" r="1" fill="rgba(255,255,255,0.5)"/>
  <!-- Appointment dot -->
  <circle cx="20" cy="24" r="3.5" fill="#c4a035"/>
  <!-- Check mark on appointment -->
  <path d="M18.2 24.2l1.2 1.2 2.6-2.8" stroke="#1a2332" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Speech tail — AI voice -->
  <path d="M26 27.5l2.5 2.5v-3.5h-2.5z" fill="#c4a035"/>
</svg>